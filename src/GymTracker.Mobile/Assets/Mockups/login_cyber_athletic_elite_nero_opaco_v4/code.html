<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
                "success-accent": "#CCFF00",
                "on-surface": "#E5E2E1",
                "surface-container": "#0E0E0E",
                "on-surface-variant": "#BAC9CC",
                "chart-fill": "rgba(0, 229, 255, 0.1)",
                "surface": "#131313",
                "outline": "#849396",
                "surface-variant": "#353534",
                "chart-line": "#00E5FF"
        },
        "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
        },
        "spacing": {
                "stack-lg": "32px",
                "stack-md": "16px",
                "stack-sm": "8px",
                "margin-mobile": "24px",
                "gutter": "16px",
                "unit": "4px",
                "section-gap": "48px"
        },
        "fontFamily": {
                "metric-xl": [
                        "Space Grotesk"
                ],
                "label-caps": [
                        "Lexend"
                ],
                "body-md": [
                        "Inter"
                ],
                "headline-md": [
                        "Space Grotesk"
                ],
                "headline-lg": [
                        "Space Grotesk"
                ],
                "display-hero": [
                        "Space Grotesk"
                ],
                "label-sm": [
                        "Lexend"
                ],
                "body-lg": [
                        "Inter"
                ]
        },
        "fontSize": {
                "metric-xl": [
                        "48px",
                        {
                                "lineHeight": "48px",
                                "letterSpacing": "-0.02em",
                                "fontWeight": "600"
                        }
                ],
                "label-caps": [
                        "12px",
                        {
                                "lineHeight": "16px",
                                "letterSpacing": "0.1em",
                                "fontWeight": "600"
                        }
                ],
                "body-md": [
                        "16px",
                        {
                                "lineHeight": "24px",
                                "fontWeight": "400"
                        }
                ],
                "headline-md": [
                        "24px",
                        {
                                "lineHeight": "32px",
                                "fontWeight": "500"
                        }
                ],
                "headline-lg": [
                        "32px",
                        {
                                "lineHeight": "40px",
                                "fontWeight": "600"
                        }
                ],
                "display-hero": [
                        "72px",
                        {
                                "lineHeight": "72px",
                                "letterSpacing": "-0.04em",
                                "fontWeight": "700"
                        }
                ],
                "label-sm": [
                        "11px",
                        {
                                "lineHeight": "14px",
                                "fontWeight": "400"
                        }
                ],
                "body-lg": [
                        "18px",
                        {
                                "lineHeight": "28px",
                                "fontWeight": "600"
                        }
                ]
        }
},
    },
  }
</script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #131313;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md text-body-md">
<!-- Login Shell Container -->
<main class="flex-1 flex flex-col items-center justify-center px-margin-mobile py-section-gap">
<!-- Header / Logo Section -->
<header class="text-center mb-stack-lg">
<h1 class="font-display-hero text-display-hero text-chart-line tracking-tighter">FORGE.</h1>
<p class="font-label-caps text-label-caps text-outline tracking-widest mt-1">ELITE TERMINAL</p>
</header>
<!-- Main Heading Container -->
<div class="w-full max-w-md text-center mb-section-gap">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-2">System Access</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Enter your credentials to initialize session.</p>
</div>
<!-- Form Section -->
<section class="w-full max-w-md bg-surface-container p-gutter rounded-xl shadow-sm border border-outline/30">
<form class="space-y-stack-md">
<!-- Email Field -->
<div class="space-y-stack-sm">
<label class="font-label-caps text-label-caps text-outline block">IDENTIFIER / EMAIL</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-chart-line transition-colors">mail</span>
<input class="w-full h-12 pl-10 pr-4 bg-surface-variant border-b-2 border-transparent focus:border-chart-line focus:ring-0 transition-all font-body-md text-on-surface rounded-t-lg" placeholder="user@forge-elite.com" type="email"/>
</div>
</div>
<!-- Passcode Field -->
<div class="space-y-stack-sm">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-outline block">PASSCODE</label>
<a class="font-label-caps text-label-caps text-chart-line hover:underline transition-all" href="#">Forgot passcode?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-chart-line transition-colors">lock</span>
<input class="w-full h-12 pl-10 pr-4 bg-surface-variant border-b-2 border-transparent focus:border-chart-line focus:ring-0 transition-all font-body-md text-on-surface rounded-t-lg" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary Action Button -->
<button class="w-full h-14 bg-chart-line text-surface flex items-center justify-center gap-2 font-headline-md text-headline-md rounded-lg active:scale-[0.98] transition-transform shadow-lg shadow-chart-line/20" type="submit">
                    ENTRA
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Divider Section -->
<div class="relative my-stack-lg flex items-center">
<div class="flex-grow border-t border-outline/50"></div>
<span class="flex-shrink mx-4 font-label-caps text-label-caps text-outline">OR AUTHENTICATE VIA</span>
<div class="flex-grow border-t border-outline/50"></div>
</div>
<!-- Social Login Buttons -->
<div class="grid grid-cols-2 gap-gutter">
<button class="h-14 border-2 border-outline hover:bg-surface-variant transition-colors rounded-lg flex items-center justify-center font-headline-md text-headline-md text-on-surface">
                    G
                </button>
<button class="h-14 border-2 border-outline hover:bg-surface-variant transition-colors rounded-lg flex items-center justify-center font-headline-md text-headline-md text-on-surface">
                    A
                </button>
</div>
</section>
<!-- Footer Section -->
<footer class="mt-section-gap w-full max-w-md text-center">
<p class="font-body-md text-on-surface-variant text-sm">
                By accessing the terminal, you agree to the <a class="text-chart-line font-semibold hover:underline" href="#">Protocols</a> &amp; <a class="text-chart-line font-semibold hover:underline" href="#">Directives</a>.
            </p>
</footer>
</main>
<!-- Decorative Background Elements -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none opacity-40">
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-chart-line/10 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[500px] h-[500px] bg-success-accent/5 rounded-full blur-[100px]"></div>
</div>
</body></html>
