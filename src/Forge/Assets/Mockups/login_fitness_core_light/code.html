<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-container": "#18f900",
                    "surface-bright": "#f8f9ff",
                    "outline-variant": "#c3c5d9",
                    "on-secondary-container": "#076d00",
                    "surface-container-high": "#dde9ff",
                    "on-secondary-fixed": "#012200",
                    "inverse-surface": "#233144",
                    "tertiary-fixed": "#e9ddff",
                    "tertiary-container": "#7544df",
                    "background": "#f8f9ff",
                    "on-tertiary": "#ffffff",
                    "on-surface-variant": "#434656",
                    "inverse-primary": "#b7c4ff",
                    "surface-container-low": "#eff4ff",
                    "tertiary-fixed-dim": "#d0bcff",
                    "on-primary-fixed": "#001452",
                    "secondary": "#076e00",
                    "on-primary": "#ffffff",
                    "on-background": "#0d1c2f",
                    "inverse-on-surface": "#ebf1ff",
                    "on-primary-fixed-variant": "#0038b6",
                    "surface-container-highest": "#d5e3fd",
                    "surface": "#f8f9ff",
                    "primary-container": "#0052ff",
                    "outline": "#737688",
                    "surface-dim": "#ccdbf4",
                    "on-tertiary-container": "#ebe0ff",
                    "on-secondary-fixed-variant": "#045300",
                    "primary-fixed": "#dde1ff",
                    "on-secondary": "#ffffff",
                    "secondary-fixed": "#78ff5f",
                    "error": "#ba1a1a",
                    "surface-container-lowest": "#ffffff",
                    "secondary-fixed-dim": "#16e600",
                    "tertiary": "#5c24c6",
                    "surface-tint": "#004ced",
                    "primary-fixed-dim": "#b7c4ff",
                    "on-tertiary-fixed": "#23005c",
                    "on-primary-container": "#dfe3ff",
                    "on-error-container": "#93000a",
                    "primary": "#003ec7",
                    "on-surface": "#0d1c2f",
                    "error-container": "#ffdad6",
                    "surface-container": "#e6eeff",
                    "surface-variant": "#d5e3fd",
                    "on-tertiary-fixed-variant": "#5516be",
                    "on-error": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-md": "16px",
                    "section-gap": "48px",
                    "margin-mobile": "24px",
                    "stack-lg": "32px",
                    "unit": "8px",
                    "gutter": "16px",
                    "stack-sm": "8px"
            },
            "fontFamily": {
                    "h1": ["Inter"],
                    "display": ["Inter"],
                    "body-lg": ["Inter"],
                    "label-caps": ["Inter"],
                    "body-md": ["Inter"],
                    "h2": ["Inter"]
            },
            "fontSize": {
                    "h1": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "display": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "h2": ["24px", {"lineHeight": "32px", "fontWeight": "700"}]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f8f9ff;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md text-body-md">
<!-- Login Shell Container -->
<main class="flex-1 flex flex-col items-center justify-center px-margin-mobile py-section-gap">
<!-- Header / Logo Section -->
<header class="text-center mb-stack-lg">
<h1 class="font-display text-display text-primary-container tracking-tighter">FORGE.</h1>
<p class="font-label-caps text-label-caps text-outline tracking-widest mt-1">ELITE TERMINAL</p>
</header>
<!-- Main Heading Container -->
<div class="w-full max-w-md text-center mb-section-gap">
<h2 class="font-h1 text-h1 text-on-surface mb-2">System Access</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Enter your credentials to initialize session.</p>
</div>
<!-- Form Section -->
<section class="w-full max-w-md bg-surface-container-lowest p-gutter rounded-xl shadow-sm border border-outline-variant/30">
<form class="space-y-stack-md">
<!-- Email Field -->
<div class="space-y-stack-sm">
<label class="font-label-caps text-label-caps text-outline block">IDENTIFIER / EMAIL</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full h-12 pl-10 pr-4 bg-surface-container-low border-b-2 border-transparent focus:border-primary-container focus:ring-0 transition-all font-body-md text-on-surface rounded-t-lg" placeholder="user@forge-elite.com" type="email"/>
</div>
</div>
<!-- Passcode Field -->
<div class="space-y-stack-sm">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-outline block">PASSCODE</label>
<a class="font-label-caps text-label-caps text-primary hover:underline transition-all" href="#">Forgot passcode?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full h-12 pl-10 pr-4 bg-surface-container-low border-b-2 border-transparent focus:border-primary-container focus:ring-0 transition-all font-body-md text-on-surface rounded-t-lg" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary Action Button -->
<button class="w-full h-14 bg-primary-container text-on-primary-container flex items-center justify-center gap-2 font-h2 text-h2 rounded-lg active:scale-[0.98] transition-transform shadow-lg shadow-primary-container/20" type="submit">
                    ENTRA
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Divider Section -->
<div class="relative my-stack-lg flex items-center">
<div class="flex-grow border-t border-outline-variant/50"></div>
<span class="flex-shrink mx-4 font-label-caps text-label-caps text-outline">OR AUTHENTICATE VIA</span>
<div class="flex-grow border-t border-outline-variant/50"></div>
</div>
<!-- Social Login Buttons -->
<div class="grid grid-cols-2 gap-gutter">
<button class="h-14 border-2 border-outline-variant hover:bg-surface-container transition-colors rounded-lg flex items-center justify-center font-h2 text-h2 text-on-surface">
                    G
                </button>
<button class="h-14 border-2 border-outline-variant hover:bg-surface-container transition-colors rounded-lg flex items-center justify-center font-h2 text-h2 text-on-surface">
                    A
                </button>
</div>
</section>
<!-- Footer Section -->
<footer class="mt-section-gap w-full max-w-md text-center">
<p class="font-body-md text-on-surface-variant text-sm">
                By accessing the terminal, you agree to the <a class="text-primary-container font-semibold hover:underline" href="#">Protocols</a> &amp; <a class="text-primary-container font-semibold hover:underline" href="#">Directives</a>.
            </p>
</footer>
</main>
<!-- Decorative Background Elements -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none opacity-40">
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary-container/5 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[500px] h-[500px] bg-secondary-container/5 rounded-full blur-[100px]"></div>
</div>
</body></html>
