name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versione (es. v0.8.0-beta)'
        required: true
        type: string
      name:
        description: 'Nome release (es. FORGE v0.8.0-beta)'
        required: true
        type: string

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Create .env
        run: echo "POCKETBASE_URL=https://placeholder.duckdns.org" > .env

      - name: Publish APK
        run: dotnet publish src/Forge/Forge.csproj -f net10.0-android -c Release /p:AndroidPackageFormats=apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.name }}
          files: src/Forge/bin/Release/net10.0-android/publish/*-Signed.apk
          draft: false
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
