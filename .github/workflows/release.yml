name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versione (es. v0.8.0-beta)'
        required: true
        type: string
      name:
        description: 'Nome release (es. FORGE v0.8.0-beta)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Create .env
        run: echo "POCKETBASE_URL=https://placeholder.duckdns.org" > .env

      - name: Publish APK
        run: dotnet publish src/Forge/Forge.csproj -f net10.0-android -c Release /p:AndroidPackageFormats=apk

      - name: Copy APK for release
        shell: pwsh
        run: |
          $apk = Get-ChildItem -Path "src/Forge/bin/Release/net10.0-android/publish/" -Filter "*-Signed.apk" | Select-Object -First 1
          Copy-Item $apk.FullName -Destination "FORGE.apk"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.name }}
          files: |
            FORGE.apk
            docker-compose.yml
          draft: false
          prerelease: true
          body: |
            ## 📦 Download
            **FORGE.apk** — installa su Android 7.0+

            ## 🐳 Self-Hosting
            ```bash
            wget https://github.com/Leonardo-Lalli/FORGE/releases/download/${{ inputs.version }}/docker-compose.yml
            docker compose up -d
            ```
            Oppure clona la repo e fai checkout del tag:
            ```bash
            git clone https://github.com/Leonardo-Lalli/FORGE.git
            cd FORGE && git checkout ${{ inputs.version }}
            docker compose up -d
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
