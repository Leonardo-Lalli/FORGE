name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore tests/Forge.Tests/Forge.Tests.csproj

      - name: Test
        run: dotnet test tests/Forge.Tests/Forge.Tests.csproj --no-restore --verbosity normal

  build-android:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Create .env
        run: echo "POCKETBASE_URL=https://placeholder.duckdns.org" > .env

      - name: Publish APK
        run: dotnet publish src/Forge/Forge.csproj -f net10.0-android -c Release /p:AndroidPackageFormats=apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FORGE-Android-APK
          path: src/Forge/bin/Release/net10.0-android/publish/*-Signed.apk
          if-no-files-found: error
