name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore tests/Forge.Tests/Forge.Tests.csproj

      - name: Test
        run: dotnet test tests/Forge.Tests/Forge.Tests.csproj --no-restore --verbosity normal
