services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: forge-pocketbase
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./pb_data:/pb_data
      - ./pb_public:/pb_public
    environment:
      - PB_ENCRYPTION_KEY=${PB_ENCRYPTION_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  init:
    image: alpine:latest
    container_name: forge-init
    depends_on:
      pocketbase:
        condition: service_healthy
    volumes:
      - ./tools/init-pocketbase.sh:/init.sh:ro
    environment:
      - PB_URL=http://pocketbase:8090
      - PB_ADMIN_EMAIL=${PB_ADMIN_EMAIL:-admin@forge.local}
      - PB_ADMIN_PASSWORD=${PB_ADMIN_PASSWORD:-forgeadmin123}
    command: sh -c "apk add --no-cache curl && sh /init.sh"

  show-ip:
    image: alpine:latest
    container_name: forge-show-ip
    depends_on:
      init:
        condition: service_completed_successfully
      pocketbase:
        condition: service_healthy
    volumes:
      - ./tools/show-ip.sh:/show-ip.sh:ro
    command: sh /show-ip.sh
    network_mode: host
