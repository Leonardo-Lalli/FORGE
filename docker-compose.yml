services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: forge-pocketbase
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./pb_data:/pb_data
      - ./pb_public:/pb_public
    environment:
      - PB_ENCRYPTION_KEY=${PB_ENCRYPTION_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  show-ip:
    image: alpine:latest
    container_name: forge-show-ip
    depends_on:
      pocketbase:
        condition: service_healthy
    command: >
      sh -c "
      echo '';
      echo '============================================';
      echo '  FORGE PocketBase is running!';
      echo '';
      echo '  Connect your app to:';
      echo '  http://YOUR-HOST-IP:8090';
      echo '';
      echo '  Find your IP with:';
      echo '    ip addr show | grep inet';
      echo '    (or ipconfig on Windows, ifconfig on Mac)';
      echo '';
      echo '  Admin panel (only from this machine):';
      echo '  http://localhost:8090/_/';
      echo '============================================';
      echo '';
      "
    network_mode: host
