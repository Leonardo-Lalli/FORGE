services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: forge-pocketbase
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./pb_data:/pb_data
      - ./pb_public:/pb_public
    environment:
      - PB_ENCRYPTION_KEY=${PB_ENCRYPTION_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  show-ip:
    image: alpine:latest
    container_name: forge-show-ip
    depends_on:
      pocketbase:
        condition: service_healthy
    command: >
      sh -c "
      apk add --no-cache --quiet iproute2 >/dev/null 2>&1;
      HOST_IP=\$(ip -o -4 addr show scope global | head -1 | awk '{print \$4}' | sed 's/\/.*//');
      if [ -z \"\$HOST_IP\" ]; then
        HOST_IP=\$(ip route get 1.1.1.1 2>/dev/null | grep -oP 'src \\K\\S+');
      fi;
      if [ -z \"\$HOST_IP\" ]; then
        HOST_IP='[esegui: ip addr show]';
      fi;
      echo '';
      echo '';
      echo '╔══════════════════════════════════════════════════════════╗';
      echo '║                                                          ║';
      echo '║     FORGE PocketBase è online!                            ║';
      echo '║                                                          ║';
      echo '║     Connetti l'\''app al server:                          ║';
      echo '║     → http://'\$HOST_IP':8090                                     ║';
      echo '║                                                          ║';
      echo '║     Admin Panel (solo da questa macchina):               ║';
      echo '║     → http://localhost:8090/_/                                     ║';
      echo '║                                                          ║';
      echo '╚══════════════════════════════════════════════════════════╝';
      echo '';
      echo '';
      "
    network_mode: host
